<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a56db">
  <title>نظام جرد المستودع</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .logo { font-size: 64px; margin-bottom: 12px; text-align: center; }
    h1 { font-size: 24px; color: #1e3a5f; margin-bottom: 6px; text-align: center; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 40px; text-align: center; }
    .btn-main {
      display: block;
      width: 100%;
      max-width: 340px;
      padding: 22px 20px;
      margin: 10px 0;
      border: none;
      border-radius: 18px;
      font-size: 19px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      transition: transform 0.1s, opacity 0.1s;
      font-family: inherit;
    }
    .btn-main:active { transform: scale(0.97); opacity: 0.9; }
    .btn-receiving { background: #1a56db; color: white; }
    .btn-audit { background: #dc2626; color: white; }
    .btn-admin {
      background: white;
      color: #374151;
      border: 2px solid #e5e7eb;
      font-size: 16px;
      padding: 16px 20px;
      margin-top: 16px;
    }
    .btn-sub {
      font-size: 13px;
      font-weight: 400;
      opacity: 0.85;
      display: block;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="logo">📦</div>
  <h1>نظام الجرد الذكي</h1>
  <p class="subtitle">اختر العملية التي تريد تنفيذها</p>

  <a href="receiving.html" class="btn-main btn-receiving">
    🟦 استلام بضاعة
    <span class="btn-sub">مسح وتسجيل الطلبية الواردة</span>
  </a>

  <a href="audit.html" class="btn-main btn-audit">
    🟥 جرد سنوي
    <span class="btn-sub">عد وتوثيق المخزون الكامل</span>
  </a>

  <a href="admin.html" class="btn-main btn-admin">
    ⚙️ إدارة المنتجات
    <span class="btn-sub">إضافة منتجات جديدة</span>
  </a>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
