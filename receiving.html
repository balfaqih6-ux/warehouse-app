<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استلام البضاعة</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --green: #2f8f46;
      --green-dark: #1f6b34;
      --lime: #b7db27;
      --dark: #231f20;
      --bg: #f4f8f1;
      --card: #ffffff;
      --muted: #64748b;
      --border: #dbe7d4;
      --red: #dc2626;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 16px; color: var(--dark); }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 14px; cursor: pointer; text-decoration: none; color: var(--dark); }
    h2 { font-size: 20px; color: var(--green-dark); }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 6px 16px rgba(35,31,32,0.04); }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    input, select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.2s; font-family: inherit; margin-bottom: 14px; }
    input:focus, select:focus { border-color: var(--green); }
    .scanner-box { width: 100%; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 1; margin-bottom: 12px; }
    .product-found { background: #f0fdf4; border: 1.5px solid #9be7ae; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .product-name { font-size: 18px; font-weight: 800; color: var(--green-dark); }
    .product-meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .product-not-found { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 12px; padding: 16px; margin-bottom: 16px; color: #991b1b; font-size: 14px; line-height: 1.8; }
    .qty-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
    .qty-row > div { flex: 1; }
    .qty-btn { width: 48px; height: 48px; border: 1.5px solid var(--border); border-radius: 10px; background: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .btn-submit { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-scan-again { width: 100%; padding: 12px; background: white; color: var(--green-dark); border: 1.5px solid var(--green); border-radius: 12px; font-size: 15px; cursor: pointer; margin-top: 10px; font-family: inherit; }
    .btn-dark { width: 100%; padding: 13px; background: var(--dark); color: white; border: none; border-radius: 12px; font-size: 15px; cursor: pointer; font-family: inherit; margin-top: 8px; }
    .success-msg { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 12px; padding: 20px; text-align: center; color: #166534; font-weight: 800; font-size: 18px; display: none; margin-bottom: 16px; }
    .session-box { background: #eef8e7; border: 1.5px solid var(--border); color: var(--green-dark); border-radius: 12px; padding: 14px; margin-bottom: 16px; display: none; font-size: 14px; line-height: 1.8; }
    .manual-row { display: grid; grid-template-columns: 1fr; gap: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 8px; }
  </style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← رجوع</a>
  <h2>استلام البضاعة</h2>
</div>

<div class="success-msg" id="successMsg">✓ تم التسجيل بنجاح!</div>

<div class="card" id="setupCard">
  <label>اسم الموظف</label>
  <input type="text" id="employeeName" placeholder="أدخل اسمك">

  <label>رقم أمر الشراء PO</label>
  <input type="text" id="purchaseOrder" placeholder="مثال: PO-1001">

  <label>رقم الفاتورة</label>
  <input type="text" id="invoiceNumber" placeholder="مثال: INV-2026-001">

  <p style="font-size:12px;color:#64748b;margin-top:-8px;margin-bottom:14px;">
    يجب إدخال رقم أمر الشراء أو رقم الفاتورة. واحد منهم يكفي.
  </p>

  <label>اسم المورد (اختياري)</label>
  <input type="text" id="supplierName" placeholder="اسم المورد">

  <button class="btn-submit" onclick="startReceivingSession()">بدء الاستلام</button>
  <button class="btn-dark" onclick="syncOfflineReceiving()">مزامنة البيانات المحفوظة مؤقتًا</button>
</div>

<div class="session-box" id="sessionBox"></div>

<div class="card" id="scannerCard" style="display:none;">
  <label>امسح باركود المنتج</label>
  <div class="scanner-box">
    <div id="reader"></div>
  </div>
  <p style="font-size:13px; color:#94a3b8; text-align:center;">وجّه الكاميرا نحو الباركود</p>
</div>

<div class="card" id="manualCard" style="display:none;">
  <label>إدخال يدوي عند تعذر قراءة الباركود</label>
  <select id="manualType">
    <option value="auto">بحث تلقائي بالباركود أو رقم الصنف</option>
    <option value="barcode">باركود</option>
    <option value="item_number">رقم الصنف SKU</option>
  </select>
  <input type="text" id="manualCode" placeholder="اكتب الباركود أو رقم الصنف">
  <button class="btn-scan-again" onclick="manualLookup()">بحث عن المنتج</button>
</div>

<div id="productResult"></div>

<div class="card" id="entryForm" style="display:none;">
  <div class="qty-row">
    <div>
      <label>الكمية المستلمة</label>
      <input type="number" id="quantity" min="1" value="1" inputmode="numeric" style="font-size:24px; font-weight:600; text-align:center;">
    </div>
    <button class="qty-btn" onclick="changeQty(-1)">−</button>
    <button class="qty-btn" onclick="changeQty(1)">+</button>
  </div>
  <label>ملاحظات (اختياري)</label>
  <input type="text" id="notes" placeholder="مثل: بضاعة تالفة..." style="margin-bottom:16px;">
  <button class="btn-submit" id="submitBtn" onclick="submitEntry()">إرسال وتسجيل</button>
  <button class="btn-scan-again" onclick="resetScanner()">مسح منتج آخر</button>
</div>

<script src="config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentProduct = null;
let scanner = null;
let currentSession = null;
let currentEntryMethod = 'scanner';

const savedName = localStorage.getItem('employeeName');
if (savedName) document.getElementById('employeeName').value = savedName;

document.getElementById('employeeName').addEventListener('change', function() {
  localStorage.setItem('employeeName', this.value.trim());
});

function makeSessionCode(type, number) {
  const clean = String(number || '').trim().toUpperCase().replace(/\s+/g, '-');
  return `${type}-${clean}`;
}

async function startReceivingSession() {
  const employeeName = document.getElementById('employeeName').value.trim();
  const po = document.getElementById('purchaseOrder').value.trim();
  const invoice = document.getElementById('invoiceNumber').value.trim();
  const supplier = document.getElementById('supplierName').value.trim();

  if (!employeeName) {
    alert('الرجاء إدخال اسم الموظف');
    return;
  }

  if (!po && !invoice) {
    alert('أدخل رقم أمر الشراء أو رقم الفاتورة');
    return;
  }

  localStorage.setItem('employeeName', employeeName);

  const documentType = po ? 'purchase_order' : 'invoice';
  const documentNumber = po || invoice;
  const sessionCode = makeSessionCode(documentType === 'purchase_order' ? 'PO' : 'INV', documentNumber);

  const { data: existing } = await db
    .from('receiving_sessions')
    .select('*')
    .eq('session_code', sessionCode)
    .single();

  if (existing) {
    currentSession = existing;
  } else {
    const { data, error } = await db
      .from('receiving_sessions')
      .insert({
        session_code: sessionCode,
        document_type: documentType,
        document_number: documentNumber,
        supplier_name: supplier,
        employee_name: employeeName,
        status: 'open'
      })
      .select()
      .single();

    if (error) {
      alert('تعذر إنشاء جلسة الاستلام');
      return;
    }

    currentSession = data;
  }

  document.getElementById('setupCard').style.display = 'none';
  document.getElementById('sessionBox').style.display = 'block';
  document.getElementById('sessionBox').innerHTML = `
    <strong>جلسة الاستلام:</strong> ${currentSession.session_code}<br>
    <strong>الموظف:</strong> ${employeeName}
  `;
  document.getElementById('scannerCard').style.display = 'block';
  document.getElementById('manualCard').style.display = 'block';

  startScanner();
}

function startScanner() {
  if (scanner) return;
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    async (code) => {
      currentEntryMethod = 'scanner';
      await stopScanner();
      document.getElementById('scannerCard').style.display = 'none';
      await lookupProduct(code, 'barcode', 'scanner');
    },
    () => {}
  ).catch(() => {
    document.getElementById('scannerCard').innerHTML = '<p style="color:#991b1b;">تعذر تشغيل الكاميرا. استخدم الإدخال اليدوي.</p>';
  });
}

async function stopScanner() {
  if (scanner) {
    await scanner.stop().catch(() => {});
    scanner = null;
  }
}

async function manualLookup() {
  const value = document.getElementById('manualCode').value.trim();
  const type = document.getElementById('manualType').value;

  if (!value) {
    alert('اكتب الباركود أو رقم الصنف');
    return;
  }

  currentEntryMethod = type === 'item_number' ? 'manual_sku' : type === 'barcode' ? 'manual_barcode' : 'manual_auto';
  await stopScanner();
  document.getElementById('scannerCard').style.display = 'none';

  if (type === 'barcode') {
    await lookupProduct(value, 'barcode', currentEntryMethod);
  } else if (type === 'item_number') {
    await lookupProduct(value, 'item_number', currentEntryMethod);
  } else {
    await lookupProduct(value, 'auto', currentEntryMethod);
  }
}

async function findProduct(value, searchType) {
  let result = null;

  if (searchType === 'barcode') {
    const { data } = await db.from('products').select('*').eq('barcode', value).single();
    result = data;
  } else if (searchType === 'item_number') {
    const { data } = await db.from('products').select('*').eq('item_number', value).single();
    result = data;
  } else {
    const { data: byBarcode } = await db.from('products').select('*').eq('barcode', value).single();
    if (byBarcode) result = byBarcode;
    if (!result) {
      const { data: bySku } = await db.from('products').select('*').eq('item_number', value).single();
      if (bySku) result = bySku;
    }
  }

  return result;
}

async function lookupProduct(value, searchType, entryMethod) {
  const resultDiv = document.getElementById('productResult');
  resultDiv.innerHTML = '<div class="card" style="text-align:center;color:#64748b;">جاري البحث...</div>';

  const data = await findProduct(value, searchType);

  if (data) {
    currentProduct = data;
    resultDiv.innerHTML = `
      <div class="product-found">
        <div class="product-name">${data.name}</div>
        <div class="product-meta">رقم الصنف: ${data.item_number}</div>
        <div class="product-meta">الوحدة: ${data.unit || '-'}</div>
        <div class="product-meta">الباركود: ${data.barcode}</div>
        <div class="product-meta">طريقة الإدخال: ${entryMethod}</div>
      </div>`;
    document.getElementById('entryForm').style.display = 'block';
    document.getElementById('quantity').focus();
  } else {
    currentProduct = null;

    await db.from('unregistered_barcodes').insert({
      source_page: 'receiving',
      barcode: searchType === 'barcode' || searchType === 'auto' ? value : null,
      item_number: searchType === 'item_number' ? value : null,
      entry_value: value,
      employee_name: document.getElementById('employeeName').value.trim(),
      session_code: currentSession ? currentSession.session_code : '',
      status: 'pending'
    });

    await db.from('audit_trail').insert({
      action_type: 'unregistered_item',
      source_page: 'receiving',
      employee_name: document.getElementById('employeeName').value.trim(),
      session_code: currentSession ? currentSession.session_code : '',
      barcode: searchType === 'barcode' || searchType === 'auto' ? value : null,
      item_number: searchType === 'item_number' ? value : null,
      details: { entry_value: value, entry_method: entryMethod }
    });

    resultDiv.innerHTML = `
      <div class="product-not-found">
        ⚠️ المنتج غير موجود في التطبيق.<br>
        تم إرسال تنبيه للمكتب لإضافة هذا المنتج.<br>
        <strong>القيمة المدخلة:</strong> ${value}
      </div>`;

    document.getElementById('entryForm').style.display = 'none';

    setTimeout(() => {
      resetScanner();
    }, 2200);
  }
}

function changeQty(delta) {
  const input = document.getElementById('quantity');
  const val = parseInt(input.value || '0') + delta;
  if (val >= 1) input.value = val;
}

function getOfflineQueue() {
  return JSON.parse(localStorage.getItem('offline_receiving_queue') || '[]');
}

function setOfflineQueue(items) {
  localStorage.setItem('offline_receiving_queue', JSON.stringify(items));
}

async function submitEntry() {
  const employeeName = document.getElementById('employeeName').value.trim();
  const quantity = parseInt(document.getElementById('quantity').value);
  const notes = document.getElementById('notes').value.trim();
  const btn = document.getElementById('submitBtn');

  if (!currentSession) {
    alert('ابدأ جلسة الاستلام أولاً');
    return;
  }

  if (!currentProduct) {
    alert('لم يتم اختيار منتج صالح');
    return;
  }

  if (!employeeName) {
    alert('الرجاء إدخال اسم الموظف');
    return;
  }

  if (!quantity || quantity < 1) {
    alert('الرجاء إدخال كمية صحيحة');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = 'جاري الإرسال <span class="spinner"></span>';

  const entry = {
    session_id: currentSession.id,
    barcode: currentProduct.barcode,
    item_number: currentProduct.item_number,
    product_name: currentProduct.name,
    quantity,
    employee_name: employeeName,
    notes,
    entry_method: currentEntryMethod
  };

  try {
    const { data: existing } = await db
      .from('receiving_log')
      .select('*')
      .eq('session_id', currentSession.id)
      .eq('item_number', currentProduct.item_number)
      .limit(1);

    if (existing && existing.length > 0) {
      const oldRow = existing[0];
      const add = confirm('هذا المنتج تم تسجيله سابقًا في نفس جلسة الاستلام. هل تريد إضافة الكمية الجديدة للكمية السابقة؟');
      if (add) {
        const { error } = await db
          .from('receiving_log')
          .update({
            quantity: oldRow.quantity + quantity,
            notes: [oldRow.notes, notes].filter(Boolean).join(' | '),
            entry_method: currentEntryMethod
          })
          .eq('id', oldRow.id);

        if (error) throw error;
      } else {
        btn.disabled = false;
        btn.innerHTML = 'إرسال وتسجيل';
        return;
      }
    } else {
      const { error } = await db.from('receiving_log').insert(entry);
      if (error) throw error;
    }

    await db.from('audit_trail').insert({
      action_type: 'receiving_entry',
      source_page: 'receiving',
      employee_name: employeeName,
      session_code: currentSession.session_code,
      barcode: currentProduct.barcode,
      item_number: currentProduct.item_number,
      product_name: currentProduct.name,
      quantity,
      details: { entry_method: currentEntryMethod, notes }
    });

    if (MAKE_WEBHOOK_RECEIVING) {
      fetch(MAKE_WEBHOOK_RECEIVING, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ ...entry, session_code: currentSession.session_code })
      }).catch(()=>{});
    }

    showSuccess();

  } catch (error) {
    const queue = getOfflineQueue();
    queue.push({ ...entry, session_code: currentSession.session_code, saved_at: new Date().toISOString() });
    setOfflineQueue(queue);
    alert('تعذر الإرسال الآن. تم حفظ العملية مؤقتًا وسيتم مزامنتها لاحقًا.');
    showSuccess();
  }

  btn.disabled = false;
  btn.innerHTML = 'إرسال وتسجيل';
}

function showSuccess() {
  document.getElementById('entryForm').style.display = 'none';
  document.getElementById('productResult').innerHTML = '';
  const msg = document.getElementById('successMsg');
  msg.style.display = 'block';
  setTimeout(() => {
    msg.style.display = 'none';
    resetScanner();
  }, 1800);
}

async function syncOfflineReceiving() {
  const queue = getOfflineQueue();
  if (!queue.length) {
    alert('لا توجد بيانات محفوظة مؤقتًا');
    return;
  }

  let success = 0;
  const remaining = [];

  for (const item of queue) {
    const { error } = await db.from('receiving_log').insert({
      session_id: item.session_id,
      barcode: item.barcode,
      item_number: item.item_number,
      product_name: item.product_name,
      quantity: item.quantity,
      employee_name: item.employee_name,
      notes: item.notes,
      entry_method: item.entry_method
    });

    if (error) remaining.push(item);
    else success++;
  }

  setOfflineQueue(remaining);
  alert(`تمت مزامنة ${success} عملية. المتبقي: ${remaining.length}`);
}

async function resetScanner() {
  currentProduct = null;
  document.getElementById('productResult').innerHTML = '';
  document.getElementById('entryForm').style.display = 'none';
  document.getElementById('quantity').value = 1;
  document.getElementById('notes').value = '';
  document.getElementById('manualCode').value = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').innerHTML = 'إرسال وتسجيل';
  document.getElementById('scannerCard').style.display = 'block';
  startScanner();
}
</script>
</body>
</html>
