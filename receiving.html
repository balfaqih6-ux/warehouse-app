<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>استلام البضاعة</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f4f8; padding: 16px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn { background: white; border: 1px solid #e5e7eb; border-radius: 10px; padding: 8px 14px; font-size: 14px; cursor: pointer; text-decoration: none; color: #374151; }
    h2 { font-size: 20px; color: #1e3a5f; }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #e5e7eb; }
    label { display: block; font-size: 13px; color: #64748b; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.2s; font-family: inherit; }
    input:focus { border-color: #1a56db; }
    .scanner-box { width: 100%; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 1; margin-bottom: 12px; }
    .product-found { background: #eff6ff; border: 1.5px solid #bfdbfe; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    .product-name { font-size: 18px; font-weight: 600; color: #1e3a5f; }
    .product-meta { font-size: 13px; color: #64748b; margin-top: 4px; }
    .product-not-found { background: #fef2f2; border: 1.5px solid #fecaca; border-radius: 12px; padding: 16px; margin-bottom: 16px; color: #991b1b; font-size: 14px; }
    .qty-row { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 16px; }
    .qty-row > div { flex: 1; }
    .qty-btn { width: 48px; height: 48px; border: 1.5px solid #e5e7eb; border-radius: 10px; background: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .qty-btn:active { background: #f3f4f6; }
    .btn-submit { width: 100%; padding: 16px; background: #1a56db; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-scan-again { width: 100%; padding: 12px; background: white; color: #1a56db; border: 1.5px solid #1a56db; border-radius: 12px; font-size: 15px; cursor: pointer; margin-top: 10px; font-family: inherit; }
    .success-msg { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 12px; padding: 20px; text-align: center; color: #166534; font-weight: 600; font-size: 18px; display: none; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-left: 8px; }
  </style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← رجوع</a>
  <h2>🟦 استلام البضاعة</h2>
</div>

<div class="card">
  <label>اسم الموظف</label>
  <input type="text" id="employeeName" placeholder="أدخل اسمك">
</div>

<div class="card" id="scannerCard">
  <label>امسح باركود المنتج</label>
  <div class="scanner-box">
    <div id="reader"></div>
  </div>
  <p style="font-size:13px; color:#94a3b8; text-align:center;">وجّه الكاميرا نحو الباركود</p>
</div>

<div id="productResult"></div>

<div class="card" id="entryForm" style="display:none;">
  <div class="qty-row">
    <div>
      <label>الكمية المستلمة</label>
      <input type="number" id="quantity" min="1" value="1" inputmode="numeric" style="font-size:24px; font-weight:600; text-align:center;">
    </div>
    <button class="qty-btn" onclick="changeQty(-1)">−</button>
    <button class="qty-btn" onclick="changeQty(1)">+</button>
  </div>
  <label>ملاحظات (اختياري)</label>
  <input type="text" id="notes" placeholder="مثل: بضاعة تالفة..." style="margin-bottom:16px;">
  <button class="btn-submit" id="submitBtn" onclick="submitEntry()">إرسال وتسجيل</button>
  <button class="btn-scan-again" onclick="resetScanner()">مسح منتج آخر</button>
</div>

<div class="success-msg" id="successMsg">✓ تم التسجيل بنجاح!</div>

<script src="config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
let currentProduct = null;
let scanner = null;

const savedName = localStorage.getItem('employeeName');
if (savedName) document.getElementById('employeeName').value = savedName;
document.getElementById('employeeName').addEventListener('change', function() {
  localStorage.setItem('employeeName', this.value);
});

function startScanner() {
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 250, height: 150 } },
    onScanSuccess,
    () => {}
  );
}

async function onScanSuccess(barcode) {
  if (scanner) { await scanner.stop(); scanner = null; }
  document.getElementById('scannerCard').style.display = 'none';
  await lookupProduct(barcode);
}

async function lookupProduct(barcode) {
  const resultDiv = document.getElementById('productResult');
  resultDiv.innerHTML = '<div class="card" style="text-align:center;color:#64748b;">جاري البحث...</div>';
  const { data } = await db.from('products').select('*').eq('barcode', barcode).single();
  if (data) {
    currentProduct = data;
    resultDiv.innerHTML = `
      <div class="product-found">
        <div class="product-name">${data.name}</div>
        <div class="product-meta">رقم الصنف: ${data.item_number}</div>
        <div class="product-meta">الوحدة: ${data.unit}</div>
        <div class="product-meta" style="font-size:11px;color:#94a3b8;">باركود: ${barcode}</div>
      </div>`;
  } else {
    currentProduct = { barcode, name: 'منتج غير معرّف', item_number: '—', unit: '—' };
    resultDiv.innerHTML = `
      <div class="product-not-found">
        ⚠️ الباركود <strong>${barcode}</strong> غير موجود في قاعدة البيانات.<br>سيتم التسجيل بالباركود فقط.
      </div>`;
  }
  document.getElementById('entryForm').style.display = 'block';
  document.getElementById('quantity').focus();
}

function changeQty(delta) {
  const input = document.getElementById('quantity');
  const val = parseInt(input.value) + delta;
  if (val >= 1) input.value = val;
}

async function submitEntry() {
  const employeeName = document.getElementById('employeeName').value.trim();
  const quantity = parseInt(document.getElementById('quantity').value);
  const notes = document.getElementById('notes').value.trim();
  const btn = document.getElementById('submitBtn');
  if (!employeeName) { alert('الرجاء إدخال اسم الموظف'); return; }
  if (!quantity || quantity < 1) { alert('الرجاء إدخال كمية صحيحة'); return; }
  btn.disabled = true;
  btn.innerHTML = 'جاري الإرسال <span class="spinner"></span>';
  const entry = {
    barcode: currentProduct.barcode,
    item_number: currentProduct.item_number,
    product_name: currentProduct.name,
    quantity, employee_name: employeeName, notes
  };
  const { error } = await db.from('receiving_log').insert(entry);
  if (!error) {
    if (MAKE_WEBHOOK_RECEIVING) {
      fetch(MAKE_WEBHOOK_RECEIVING, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(entry) }).catch(()=>{});
    }
    document.getElementById('entryForm').style.display = 'none';
    document.getElementById('productResult').innerHTML = '';
    const msg = document.getElementById('successMsg');
    msg.style.display = 'block';
    setTimeout(() => { msg.style.display = 'none'; resetScanner(); }, 2500);
  } else {
    alert('حدث خطأ، تحقق من الاتصال بالإنترنت');
    btn.disabled = false;
    btn.innerHTML = 'إرسال وتسجيل';
  }
}

function resetScanner() {
  currentProduct = null;
  document.getElementById('productResult').innerHTML = '';
  document.getElementById('entryForm').style.display = 'none';
  document.getElementById('quantity').value = 1;
  document.getElementById('notes').value = '';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').innerHTML = 'إرسال وتسجيل';
  document.getElementById('scannerCard').style.display = 'block';
  startScanner();
}

startScanner();
</script>
</body>
</html>
