<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة المنتجات</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
  <style>
    :root {
      --green: #2f8f46;
      --green-dark: #1f6b34;
      --lime: #b7db27;
      --dark: #231f20;
      --bg: #f4f8f1;
      --card: #ffffff;
      --muted: #64748b;
      --border: #dbe7d4;
      --blue: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); padding: 16px; color: var(--dark); }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .back-btn { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 14px; cursor: pointer; text-decoration: none; color: var(--dark); }
    h2 { font-size: 20px; color: var(--green-dark); }
    .tab-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; border: 1.5px solid var(--border); background: white; font-size: 14px; cursor: pointer; color: var(--muted); font-family: inherit; }
    .tab.active { background: var(--green); color: white; border-color: var(--green); font-weight: 800; }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); box-shadow: 0 6px 16px rgba(35,31,32,0.04); }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
    input, select { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.2s; font-family: inherit; margin-bottom: 14px; }
    input:focus, select:focus { border-color: var(--green); }
    .btn-scan { width: 100%; padding: 12px; background: #f8fafc; border: 1.5px dashed #94a3b8; border-radius: 10px; font-size: 15px; cursor: pointer; margin-bottom: 14px; color: #475569; font-family: inherit; }
    .scanner-box { width: 100%; border-radius: 12px; overflow: hidden; background: #000; aspect-ratio: 1; margin-bottom: 12px; display: none; }
    .btn-save { width: 100%; padding: 16px; background: var(--green); color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 800; cursor: pointer; font-family: inherit; }
    .btn-save:disabled { opacity: 0.5; }
    .btn-secondary { width: 100%; padding: 14px; background: var(--dark); color: white; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; margin-bottom: 10px; }
    .success-msg { background: #f0fdf4; border: 1.5px solid #86efac; border-radius: 12px; padding: 16px; text-align: center; color: #166534; font-weight: 800; margin-bottom: 16px; display: none; }
    .product-item { padding: 14px; border-bottom: 1px solid #f1f5f9; }
    .product-item:last-child { border-bottom: none; }
    .p-name { font-weight: 800; font-size: 15px; color: var(--green-dark); }
    .p-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  </style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back-btn">← رجوع</a>
  <h2>إدارة المنتجات</h2>
</div>

<div class="tab-row">
  <button class="tab active" onclick="showTab('add', this)">إضافة منتج</button>
  <button class="tab" onclick="showTab('list', this)">قائمة المنتجات</button>
</div>

<div id="tabAdd">
  <div class="success-msg" id="successMsg">✓ تم حفظ المنتج بنجاح</div>
  <div class="card">
    <button class="btn-secondary" onclick="downloadProductTemplate()">تحميل قالب Excel للمنتجات</button>

    <label>الباركود</label>
    <button class="btn-scan" onclick="toggleScanner()">📷 مسح الباركود بالكاميرا</button>
    <div class="scanner-box" id="scannerBox">
      <div id="reader2"></div>
    </div>
    <input type="text" id="barcode" placeholder="أو اكتب الباركود يدوياً" inputmode="numeric">

    <label>رقم الصنف (SKU)</label>
    <input type="text" id="itemNumber" placeholder="مثال: SKU-001">

    <label>اسم المنتج</label>
    <input type="text" id="productName" placeholder="مثال: كرسي مكتبي أسود">

    <label>وحدة القياس</label>
    <select id="unit">
      <option value="قطعة">قطعة</option>
      <option value="كرتون">كرتون</option>
      <option value="كيلو">كيلو</option>
      <option value="متر">متر</option>
      <option value="لتر">لتر</option>
    </select>

    <label>وصف (اختياري)</label>
    <input type="text" id="description" placeholder="تفاصيل إضافية...">

    <button class="btn-save" id="saveBtn" onclick="saveProduct()">حفظ المنتج</button>

    <div style="height:1px;background:#dbe7d4;margin:18px 0;"></div>

    <label>رفع المنتجات من Excel</label>
    <input type="file" id="excelFile" accept=".xlsx,.xls">

    <button class="btn-save" id="uploadExcelBtn" style="background:#2563eb;" onclick="uploadExcel()">رفع المنتجات من Excel</button>

    <p style="font-size:12px;color:#64748b;margin-top:10px;line-height:1.7;">
      الأعمدة المطلوبة في ملف Excel:
      name, item_number, barcode, unit, description
    </p>
  </div>
</div>

<div id="tabList" style="display:none;">
  <div class="card">
    <input type="text" id="searchInput" placeholder="ابحث باسم أو رقم الصنف أو باركود..." oninput="filterProducts(this.value)" style="margin-bottom:0;">
  </div>
  <div class="card" id="productListCard">
    <p style="text-align:center;color:#94a3b8;padding:20px;">جاري التحميل...</p>
  </div>
</div>

<script src="config.js"></script>
<script>
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
let scanner2 = null;
let allProducts = [];

function showTab(tab, btn) {
  document.getElementById('tabAdd').style.display = tab === 'add' ? 'block' : 'none';
  document.getElementById('tabList').style.display = tab === 'list' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (tab === 'list') loadProducts();
}

function toggleScanner() {
  const box = document.getElementById('scannerBox');
  if (box.style.display === 'none' || !box.style.display) {
    box.style.display = 'block';
    scanner2 = new Html5Qrcode("reader2");
    scanner2.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: { width: 250, height: 150 } },
      (code) => {
        document.getElementById('barcode').value = code;
        scanner2.stop();
        scanner2 = null;
        box.style.display = 'none';
      },
      () => {}
    );
  } else {
    if (scanner2) scanner2.stop();
    scanner2 = null;
    box.style.display = 'none';
  }
}

async function downloadProductTemplate() {
  const workbook = new ExcelJS.Workbook();
  const worksheet = workbook.addWorksheet('Products Template');

  worksheet.columns = [
    { header: 'name', key: 'name', width: 30 },
    { header: 'item_number', key: 'item_number', width: 22 },
    { header: 'barcode', key: 'barcode', width: 24 },
    { header: 'unit', key: 'unit', width: 16 },
    { header: 'description', key: 'description', width: 35 }
  ];

  worksheet.getRow(1).font = { bold: true };
  worksheet.getRow(1).alignment = { horizontal: 'center' };

  worksheet.addRow({
    name: '',
    item_number: '',
    barcode: '',
    unit: 'قطعة',
    description: ''
  });

  const unitOptions = ['قطعة', 'كرتون', 'كيلو', 'متر', 'لتر',];

  for (let row = 2; row <= 1000; row++) {
    worksheet.getCell(`D${row}`).dataValidation = {
      type: 'list',
      allowBlank: false,
      formulae: [`"${unitOptions.join(',')}"`],
      showErrorMessage: true,
      errorStyle: 'error',
      errorTitle: 'وحدة غير صحيحة',
      error: 'اختر وحدة القياس من القائمة فقط'
    };
  }

  worksheet.views = [
    { state: 'frozen', ySplit: 1 }
  ];

  worksheet.getColumn('A').alignment = { horizontal: 'right' };
  worksheet.getColumn('B').alignment = { horizontal: 'center' };
  worksheet.getColumn('C').alignment = { horizontal: 'center' };
  worksheet.getColumn('D').alignment = { horizontal: 'center' };
  worksheet.getColumn('E').alignment = { horizontal: 'right' };

  const buffer = await workbook.xlsx.writeBuffer();

  const blob = new Blob([buffer], {
    type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
  });

  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'zain_products_template.xlsx';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  URL.revokeObjectURL(link.href);
}

async function saveProduct() {
  const barcode = document.getElementById('barcode').value.trim();
  const itemNumber = document.getElementById('itemNumber').value.trim();
  const name = document.getElementById('productName').value.trim();
  const unit = document.getElementById('unit').value;
  const description = document.getElementById('description').value.trim();

  if (!barcode || !itemNumber || !name || !unit) {
    alert('الباركود ورقم الصنف والاسم والوحدة مطلوبة');
    return;
  }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'جاري الحفظ...';

  const { error } = await db.from('products').upsert(
    { barcode, item_number: itemNumber, name, unit, description, updated_at: new Date().toISOString() },
    { onConflict: 'barcode' }
  );

  if (!error) {
    await db.from('audit_trail').insert({
      action_type: 'product_saved',
      source_page: 'admin',
      barcode,
      item_number: itemNumber,
      product_name: name,
      details: { unit, description }
    });

    document.getElementById('successMsg').style.display = 'block';
    setTimeout(() => document.getElementById('successMsg').style.display = 'none', 3000);
    ['barcode','itemNumber','productName','description'].forEach(id => document.getElementById(id).value = '');
  } else {
    alert('خطأ: تأكد أن الباركود ورقم الصنف غير مكررين');
  }

  btn.disabled = false;
  btn.textContent = 'حفظ المنتج';
}

async function uploadExcel() {
  const file = document.getElementById("excelFile").files[0];

  if (!file) {
    alert("اختر ملف Excel أولاً");
    return;
  }

  const reader = new FileReader();

  reader.onload = async (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const workbook = XLSX.read(data, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);

      if (!rows.length) {
        alert("ملف Excel فارغ");
        return;
      }

      const products = rows.map(row => ({
        barcode: String(row.barcode || "").trim(),
        item_number: String(row.item_number || row.sku || "").trim(),
        name: String(row.name || "").trim(),
        unit: String(row.unit || "قطعة").trim(),
        description: String(row.description || "").trim(),
        updated_at: new Date().toISOString()
      }));

      const invalidRows = products.filter(p => !p.barcode || !p.item_number || !p.name || !p.unit);

      if (invalidRows.length > 0) {
        alert("فيه صفوف ناقصة. لازم كل منتج يحتوي على name و item_number و barcode و unit");
        return;
      }

      const btn = document.getElementById("uploadExcelBtn");
      btn.disabled = true;
      btn.textContent = "جاري رفع المنتجات...";

      const { error } = await db
        .from("products")
        .upsert(products, { onConflict: "barcode" });

      if (error) {
        console.error(error);
        alert("صار خطأ أثناء رفع Excel: " + error.message);
      } else {
        await db.from('audit_trail').insert({
          action_type: 'products_excel_uploaded',
          source_page: 'admin',
          quantity: products.length,
          details: { count: products.length }
        });

        alert("تم رفع المنتجات من Excel بنجاح ✅");
        document.getElementById("excelFile").value = "";
        loadProducts();
      }

      btn.disabled = false;
      btn.textContent = "رفع المنتجات من Excel";

    } catch (err) {
      console.error(err);
      alert("تعذر قراءة ملف Excel");
    }
  };

  reader.readAsArrayBuffer(file);
}

async function loadProducts() {
  const { data } = await db.from('products').select('*').order('name');
  allProducts = data || [];
  renderProducts(allProducts);
}

function renderProducts(list) {
  const card = document.getElementById('productListCard');
  if (!list.length) {
    card.innerHTML = '<p style="text-align:center;color:#94a3b8;padding:20px;">لا توجد منتجات بعد</p>';
    return;
  }
  card.innerHTML = list.map(p => `
    <div class="product-item">
      <div class="p-name">${p.name}</div>
      <div class="p-meta">رقم الصنف: ${p.item_number} &nbsp;|&nbsp; الوحدة: ${p.unit}</div>
      <div class="p-meta" style="color:#94a3b8;">باركود: ${p.barcode}</div>
    </div>
  `).join('');
}

function filterProducts(query) {
  const q = query.toLowerCase();
  renderProducts(allProducts.filter(p =>
    (p.name || '').toLowerCase().includes(q) ||
    (p.item_number || '').toLowerCase().includes(q) ||
    (p.barcode || '').includes(q)
  ));
}
</script>
</body>
</html>
